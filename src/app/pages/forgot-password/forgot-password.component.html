<div class="auth-container">

  <p-card header="Recuperar Senha">

    <div class="field">
      <input pInputText [(ngModel)]="email" placeholder="Digite seu email" />
    </div>

    <button
      pButton
      label="Enviar recuperação"
      (click)="recover()"
      class="w-full">
    </button>

    <div class="links">
      <a routerLink="/login">Voltar para login</a>
    </div>

  </p-card>

</div>
