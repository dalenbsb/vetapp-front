<p-toast></p-toast>

<p-confirmDialog></p-confirmDialog>

<div class="card">

    <div class="flex justify-content-between align-items-center mb-4">

        <h3>Cores</h3>

        <button
            pButton
            type="button"
            label="Nova Cor"
            icon="pi pi-plus"
            (click)="novo()">
        </button>

    </div>

    <p-table
        [value]="registros"
        [loading]="loading"
        responsiveLayout="scroll"
        dataKey="id">

        <ng-template pTemplate="header">

            <tr>
                <th>ID</th>
                <th>Descrição</th>
                <th>Espécie</th>
                <th width="150">Ações</th>
            </tr>

        </ng-template>

        <ng-template pTemplate="body" let-cor>

            <tr>

                <td>{{ cor.id }}</td>

                <td>{{ cor.descricao }}</td>

                <td>{{ cor.especieDescricao }}</td>

                <td>

                    <button
                        pButton
                        pRipple
                        icon="pi pi-pencil"
                        class="p-button-rounded p-button-text"
                        (click)="editar(cor)">
                    </button>

                    <button
                        pButton
                        pRipple
                        icon="pi pi-trash"
                        class="p-button-rounded p-button-text p-button-danger"
                        (click)="excluir(cor)">
                    </button>

                </td>

            </tr>

        </ng-template>

    </p-table>

</div>

<p-dialog
    [(visible)]="registroDialog"
    [modal]="true"
    [closable]="true"
    [draggable]="false"
    [resizable]="false"
    [style]="{ width: '34rem' }"
    [breakpoints]="{
        '960px': '75vw',
        '640px': '96vw'
    }"
    styleClass="crud-dialog">

    <!-- HEADER -->
    <ng-template pTemplate="header">

        <div class="dialog-header-custom">

            <div class="dialog-icon">
                <i class="pi pi-palette"></i>
            </div>

            <div class="dialog-header-text">

                <h2 class="dialog-title">
                    {{ registro?.id ? 'Editar Cor' : 'Nova Cor' }}
                </h2>

                <p class="dialog-subtitle">
                    Gerencie as informações da cor do animal
                </p>

            </div>

        </div>

    </ng-template>

    <!-- BODY -->
    <div
        class="dialog-body"
        *ngIf="registro">

        <!-- DESCRIÇÃO -->
        <div class="form-group">

            <label class="form-label">
                Descrição
            </label>

            <span class="p-input-icon-left w-full">

                <i class="pi pi-tag"></i>

                <input
                    pInputText
                    [(ngModel)]="registro.descricao"
                    placeholder="Digite a descrição"
                    class="w-full form-control" />

            </span>

        </div>

        <!-- ESPÉCIE -->
        <div class="form-group">

            <label class="form-label">
                Espécie
            </label>

            <p-select
                [options]="especies"
                optionLabel="descricao"
                optionValue="id"
                [(ngModel)]="registro.especieId"
                placeholder="Selecione a espécie"
                appendTo="body"
                class="w-full form-control">
            </p-select>

        </div>

    </div>

    <!-- FOOTER -->
    <ng-template pTemplate="footer">

        <div class="dialog-footer-custom">

            <button
                pButton
                type="button"
                label="Cancelar"
                icon="pi pi-times"
                class="p-button-text"
                (click)="fecharDialog()">
            </button>

            <button
                pButton
                type="button"
                label="Salvar"
                icon="pi pi-check"
                (click)="salvar()">
            </button>

        </div>

    </ng-template>

</p-dialog>
